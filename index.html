<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a56a0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>生産反数管理 v1.2</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<!-- ===== 認証画面 ===== -->
<div id="screen-auth" class="screen active">
  <div class="auth-container">
    <div class="auth-logo">
      <div class="auth-icon">🧵</div>
      <h1>生産反数管理 v1.2</h1>
      <p>日次生産データの入力・管理システム</p>
    </div>
    <div class="auth-card">
      <p>Googleアカウントでサインインしてください</p>
      <div id="google-signin-btn"></div>
      <div id="auth-error" class="error-msg hidden"></div>
    </div>
  </div>
</div>

<!-- ===== ホーム画面 ===== -->
<div id="screen-home" class="screen hidden">
  <header class="app-header">
    <div class="header-title">生産反数管理 v1.2</div>
    <div class="header-user">
      <span id="user-name"></span>
      <button id="btn-signout" class="btn-signout-text" title="サインアウト">ログアウト</button>
    </div>
  </header>

  <main class="home-main">

    <!-- 月ナビゲーション -->
    <div class="month-nav card">
      <button id="btn-prev-month" class="btn-month-nav">&#8249;</button>
      <div class="month-display" id="current-month-label">----年 -月</div>
      <button id="btn-next-month" class="btn-month-nav">&#8250;</button>
    </div>

    <!-- 月次サマリー -->
    <div class="summary-card card">
      <div class="summary-item">
        <div class="summary-label">月間生産</div>
        <div class="summary-value" id="sum-total">-</div>
        <div class="summary-unit">反</div>
      </div>
      <div class="summary-divider"></div>
      <div class="summary-item">
        <div class="summary-label">日産</div>
        <div class="summary-value" id="sum-daily">-</div>
        <div class="summary-unit">反/日</div>
      </div>
      <div class="summary-divider"></div>
      <div class="summary-item">
        <div class="summary-label">稼働日数</div>
        <div class="summary-value" id="sum-days">-</div>
        <div class="summary-unit">日</div>
      </div>
    </div>

    <!-- アクションボタン -->
    <div class="action-buttons">
      <button id="btn-today-input" class="btn-action btn-primary">
        <span class="btn-icon-lg">✏️</span>
        <span>今日の入力</span>
      </button>
      <button id="btn-view-graph" class="btn-action btn-secondary">
        <span class="btn-icon-lg">📊</span>
        <span>月次グラフ</span>
      </button>
    </div>

    <!-- ミニチャートプレビュー -->
    <div class="mini-chart card">
      <div class="card-title">月次概要グラフ</div>
      <div class="chart-container-mini">
        <canvas id="mini-chart"></canvas>
      </div>
    </div>

    <!-- 最近の入力一覧 -->
    <div class="recent-entries card">
      <div class="card-title">最近の入力データ</div>
      <div id="recent-list">
        <div class="recent-empty">読み込み中...</div>
      </div>
    </div>

  </main>
</div>

<!-- ===== 入力画面 ===== -->
<div id="screen-input" class="screen hidden">
  <header class="app-header">
    <button id="btn-back-from-input" class="btn-back">&#8249; 戻る</button>
    <div class="header-title" id="input-header-title">データ入力</div>
    <div style="width:60px;"></div>
  </header>

  <main class="input-main">

    <!-- 日付セレクタ -->
    <div class="date-selector card">
      <button id="btn-prev-day" class="btn-day-nav">&#8249;</button>
      <div class="date-display" onclick="showDatePicker()">
        <div class="date-day" id="input-date-day">-/-</div>
        <div class="date-weekday" id="input-date-weekday">---曜日</div>
      </div>
      <button id="btn-next-day" class="btn-day-nav">&#8250;</button>
    </div>

    <!-- ネイティブ日付ピッカー（非表示） -->
    <input type="date" id="date-picker-input" class="hidden-date-input">

    <!-- 入力フォーム -->
    <div class="input-form card">
      <div class="form-group">
        <label class="form-label" for="input-seisan">生産数</label>
        <input
          type="number"
          id="input-seisan"
          class="form-input"
          placeholder="例: 68.5"
          step="0.1"
          min="0"
          inputmode="decimal"
          autocomplete="off">
      </div>

      <div class="form-group">
        <label class="form-label" for="input-bc">B.C反</label>
        <div class="input-with-pct">
          <input
            type="number"
            id="input-bc"
            class="form-input"
            placeholder="例: 0.9"
            step="0.1"
            min="0"
            inputmode="decimal"
            autocomplete="off">
          <div class="pct-display" id="pct-bc">-</div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="input-doji">胴継反</label>
        <div class="input-with-pct">
          <input
            type="number"
            id="input-doji"
            class="form-input"
            placeholder="例: 6.5"
            step="0.1"
            min="0"
            inputmode="decimal"
            autocomplete="off">
          <div class="pct-display" id="pct-doji">-</div>
        </div>
      </div>
    </div>

    <!-- ステータスメッセージ -->
    <div id="input-status" class="status-msg hidden"></div>

    <!-- 保存・削除ボタン -->
    <div class="input-actions">
      <button id="btn-save" class="btn-save">保存</button>
      <button id="btn-delete" class="btn-delete hidden">このデータを削除</button>
    </div>

  </main>
</div>

<!-- ===== グラフ画面 ===== -->
<div id="screen-graph" class="screen hidden">
  <header class="app-header no-print">
    <button id="btn-back-from-graph" class="btn-back">&#8249; 戻る</button>
    <div class="header-title">月次グラフ</div>
    <div class="graph-actions">
      <button class="btn-icon-text" onclick="printGraph()" title="印刷">🖨️</button>
      <button class="btn-icon-text" onclick="saveAsPDF()" title="PDF保存">📄</button>
    </div>
  </header>

  <main class="graph-main" id="graph-print-area">

    <!-- タイトル -->
    <div class="graph-title-section">
      <h2 class="graph-title" id="graph-title">----年 -月 生産反数</h2>
      <p class="graph-subtitle" id="graph-subtitle"></p>
    </div>

    <!-- メインチャート -->
    <div class="chart-container">
      <canvas id="main-chart"></canvas>
    </div>

    <!-- 印刷時のサマリーテーブル -->
    <div class="graph-summary-table print-only">
      <table id="print-summary-table">
        <tr>
          <th>月間生産反数</th>
          <th>稼働日数</th>
          <th>日産</th>
          <th>B.C反%</th>
          <th>胴継反%</th>
        </tr>
        <tr>
          <td id="pt-total">-</td>
          <td id="pt-days">-</td>
          <td id="pt-daily">-</td>
          <td id="pt-bc-pct">-</td>
          <td id="pt-doji-pct">-</td>
        </tr>
      </table>
    </div>

  </main>
</div>

<!-- ===== ローディングオーバーレイ ===== -->
<div id="loading-overlay" class="loading-overlay hidden">
  <div class="loading-spinner"></div>
  <div class="loading-text">処理中...</div>
</div>

<!-- ===== 確認ダイアログ ===== -->
<div id="confirm-dialog" class="dialog-overlay hidden">
  <div class="dialog">
    <p id="confirm-message">確認メッセージ</p>
    <div class="dialog-buttons">
      <button id="confirm-cancel" class="btn-dialog-cancel">キャンセル</button>
      <button id="confirm-ok" class="btn-dialog-ok">OK</button>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/app.js"></script>
</body>
</html>
